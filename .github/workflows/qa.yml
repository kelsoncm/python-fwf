name: QA

on:
  push:
    branches:
      - "*"
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system --upgrade -e ".[dev]"

      - name: Check Python formatting (black + isort)
        run: |
          black . --check

      - name: Run Bandit SAST
        run: bandit -c pyproject.toml -r sc4py

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20

      - name: Run Semgrep SAST
        if: github.event_name == 'pull_request' || github.event_name == 'schedule'
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

  test:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-bandit flake8-pyproject pytest pytest-cov pytest-coverage-gate

      - name: Install project dependencies
        run: pip install -e .

      - name: sc4py - Lint with flake8
        run: |
          flake8 sc4py --count --select=E9,F63,F7,F82,S --show-source --statistics
          flake8 sc4py --count --max-complexity=10 --max-line-length=127 --statistics

      - name: sc4py - Test with coverage
        run: |
          pytest --cov=sc4py --cov-report=xml:coverage.xml --cov-report=term-missing
          pytest-coverage-gate --coverage-xml=coverage.xml --baseline=.coverage-baseline

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

      - name: Upload sc4py coverage to Codecov
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: coverage.xml
          flags: sc4py,py${{ matrix.python-version }}
          fail_ci_if_error: false
